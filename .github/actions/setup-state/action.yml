name: Setup ClawSweeper state
description: Checkout generated state and hydrate it into the ClawSweeper worktree.
inputs:
  token:
    description: GitHub token with contents read/write access to the state repo.
    required: true
  state-path:
    description: Checkout path for the generated state repository.
    required: false
    default: clawsweeper-state
  worktree-path:
    description: ClawSweeper checkout path to hydrate.
    required: false
    default: .
  node-version:
    description: Node.js version used to run the TypeScript hydrator.
    required: false
    default: "24"
  filter:
    description: Git partial clone filter for the generated state repository.
    required: false
    default: ""
  fetch-depth:
    description: Git fetch depth for the generated state repository. Publish retries fetch the remote tip before rebasing.
    required: false
    default: "1"
  sparse-checkout:
    description: Optional newline-separated state paths to hydrate.
    required: false
    default: ""
  persist-credentials:
    description: Persist the checkout token in local git config for later state publication.
    required: false
    default: "true"
  coordinator-url:
    description: Durable FIFO coordinator used before any generated-state mutation.
    required: false
    default: https://clawsweeper.openclaw.ai
  coordinator-enabled:
    description: Enable durable FIFO admission; false is the explicit legacy-fence rollback mode.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - uses: actions/checkout@v7
      with:
        repository: openclaw/clawsweeper-state
        ref: state
        path: ${{ inputs.state-path }}
        token: ${{ inputs.token }}
        filter: ${{ inputs.filter }}
        fetch-depth: ${{ inputs.fetch-depth }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
        persist-credentials: ${{ inputs.persist-credentials }}

    - name: Export state root
      shell: bash
      env:
        STATE_COORDINATOR_ENABLED: ${{ inputs.coordinator-enabled }}
        STATE_COORDINATOR_URL: ${{ inputs.coordinator-url }}
      # Keep immutable ledger server merges dormant until state publishers can
      # fetch a merge-heavy shallow branch without hydrating its ancestry.
      # The repository variable is the migration/rollback boundary. Once it is
      # enabled, the publisher itself fails closed if its step-scoped credential
      # or this URL is missing; checkout-only jobs never receive that credential.
      run: |
        case "$STATE_COORDINATOR_ENABLED" in
          true) coordinator_enabled=1 ;;
          false) coordinator_enabled=0 ;;
          *) echo "coordinator-enabled must be true or false" >&2; exit 2 ;;
        esac
        {
          echo "CLAWSWEEPER_STATE_DIR=$GITHUB_WORKSPACE/${{ inputs.state-path }}"
          echo "CLAWSWEEPER_STATE_COORDINATOR_ENABLED=$coordinator_enabled"
          echo "CLAWSWEEPER_STATE_COORDINATOR_URL=$STATE_COORDINATOR_URL"
        } >> "$GITHUB_ENV"

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Hydrate generated state
      shell: bash
      env:
        CLAWSWEEPER_STATE_DIR: ${{ inputs.state-path }}
      run: node "${{ inputs.worktree-path }}/scripts/hydrate-state.ts" --state-dir "${{ inputs.state-path }}" --worktree "${{ inputs.worktree-path }}"
