name: Sync crawl-remote deployment secret

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type "sync crawl-remote production secret" to confirm
        required: true
        type: string

permissions: {}

concurrency:
  group: sync-crawl-remote-deploy-secret
  cancel-in-progress: false

jobs:
  sync:
    name: Sync protected Cloudflare credential
    if: ${{ github.actor == 'vincentkoc' && github.actor_id == '25068' && inputs.confirmation == 'sync crawl-remote production secret' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
      CLOUDFLARE_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN || secrets.OPENCLAW_CLOUDFLARE_API_TOKEN }}
      TARGET_REPOSITORY: openclaw/crawl-remote
      TARGET_ENVIRONMENT: production
    steps:
      - name: Create exact-repository secret token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: crawl-remote
          permission-environments: write

      - name: Validate fixed production target
        env:
          DISPATCH_REF: ${{ github.ref }}
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          test "$DISPATCH_REF" = "refs/heads/main"
          test -n "$GH_TOKEN"
          test -n "$CLOUDFLARE_API_TOKEN"

          policy="$(
            gh api \
              "repos/$TARGET_REPOSITORY/environments/$TARGET_ENVIRONMENT/deployment-branch-policies" \
              --jq '.branch_policies[] | select(.type == "branch") | .name'
          )"
          grep -Fxq "main" <<<"$policy"

      - name: Sync Cloudflare Workers token
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          printf '%s' "$CLOUDFLARE_API_TOKEN" |
            gh secret set CLOUDFLARE_API_TOKEN \
              --repo "$TARGET_REPOSITORY" \
              --env "$TARGET_ENVIRONMENT"

      - name: Verify secret registration
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh api \
            "repos/$TARGET_REPOSITORY/environments/$TARGET_ENVIRONMENT/secrets" \
            --jq '.secrets[].name' |
            grep -Fxq "CLOUDFLARE_API_TOKEN"
