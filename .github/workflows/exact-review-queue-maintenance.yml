name: Maintain exact review queue

on:
  workflow_dispatch:
    inputs:
      execute:
        description: "Apply bounded publication supersession"
        required: true
        type: boolean
        default: false
      passes:
        description: "Maximum 100-item passes"
        required: true
        type: string
        default: "1"

concurrency:
  group: exact-review-queue-maintenance
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reconcile:
    if: ${{ inputs.execute }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EXACT_REVIEW_QUEUE_URL: ${{ vars.CLAWSWEEPER_EXACT_REVIEW_QUEUE_URL || 'https://clawsweeper.openclaw.ai' }}
      CLAWSWEEPER_WEBHOOK_SECRET: ${{ secrets.CLAWSWEEPER_WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          filter: blob:none
          fetch-depth: 1
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Reconcile superseded publication items
        env:
          PASSES: ${{ inputs.passes }}
        run: >-
          pnpm run --silent repair:exact-review-queue-maintenance --
          --apply
          --max-items 100
          --passes "$PASSES"
