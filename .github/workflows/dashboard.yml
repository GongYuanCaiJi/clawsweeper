name: ClawSweeper Live Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "scripts/dashboard-refresh-ci.mjs"
      - "scripts/dashboard-smoke.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/dashboard.yml"

permissions:
  contents: read

concurrency:
  group: clawsweeper-live-dashboard
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy dashboard Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: 91b59577e757131d68d55a471fe32aca
      CLOUDFLARE_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN || secrets.OPENCLAW_CLOUDFLARE_API_TOKEN }}
      CF_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN || secrets.OPENCLAW_CLOUDFLARE_API_TOKEN }}
      CLAWSWEEPER_STATUS_URL: https://clawsweeper.openclaw.ai
      CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
      STATUS_STORE_NAMESPACE: clawsweeper-status-store
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-pnpm

      - name: Verify Cloudflare token is configured
        run: test -n "$CLOUDFLARE_API_TOKEN"

      - name: Prepare Worker bindings
        id: bindings
        run: |
          set -euo pipefail
          test -n "$CLAWSWEEPER_STATUS_INGEST_TOKEN"
          namespace_id="$(curl -fsS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces?per_page=100" \
            | jq -r --arg title "$STATUS_STORE_NAMESPACE" '.result[]? | select(.title == $title) | .id' \
            | head -n 1)"
          if [ -z "$namespace_id" ]; then
            namespace_id="$(curl -fsS -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"title\":\"$STATUS_STORE_NAMESPACE\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces" \
              | jq -r '.result.id')"
          fi
          test -n "$namespace_id"
          cp dashboard/wrangler.toml "$RUNNER_TEMP/dashboard-wrangler.toml"
          {
            echo
            echo "[[kv_namespaces]]"
            echo 'binding = "STATUS_STORE"'
            echo "id = \"$namespace_id\""
          } >> "$RUNNER_TEMP/dashboard-wrangler.toml"
          echo "config=$RUNNER_TEMP/dashboard-wrangler.toml" >> "$GITHUB_OUTPUT"

      - name: Sync ingest secret
        run: |
          printf '%s' "$CLAWSWEEPER_STATUS_INGEST_TOKEN" \
            | npx wrangler@4.90.0 secret put INGEST_TOKEN --config "${{ steps.bindings.outputs.config }}"

      - name: Deploy Worker
        run: npx wrangler@4.90.0 deploy --config "${{ steps.bindings.outputs.config }}"

      - name: Smoke test live dashboard
        run: pnpm run dashboard:smoke -- "$CLAWSWEEPER_STATUS_URL"
